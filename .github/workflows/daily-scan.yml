name: Daily DICOM Privacy Scan

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pydicom
        run: pip install pydicom
      - name: Create sample DICOM file for testing
        run: |
          mkdir -p test_dicoms
          python -c "import pydicom; ds = pydicom.dataset.Dataset(); ds.PatientName = 'FAKE_PATIENT'; ds.PatientID = '12345'; ds.save_as('test_dicoms/sample.dcm')"
      - name: Run scanner on sample folder
        run: python scan_dicom.py test_dicoms --output report.csv
      - name: Upload CSV report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: phi-scan-report
          path: report.csv
